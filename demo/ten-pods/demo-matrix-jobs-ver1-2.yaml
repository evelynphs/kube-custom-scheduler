apiVersion: batch/v1
kind: Job
metadata:
  name: job-matrix-mult-default-2
  annotations:
    scheduling/deadline-duration: "347s"  
spec:
  template:
    metadata:
      annotations:
        scheduling/deadline-duration: "347s"
      labels:
        app: matrix-mult
    spec:
      schedulerName: deadline-default-scheduler
      restartPolicy: Never
      containers:
      - name: matrix-mult
        image: evelynphs/deadline-aware-workload:matrix
        resources:
          requests:
            cpu: "1000m"
            memory: "256Mi"
        command: ["python3", "/app/matrix_mult.py", "700", "14", "35"]