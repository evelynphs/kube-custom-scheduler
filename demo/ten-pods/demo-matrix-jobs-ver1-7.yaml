apiVersion: batch/v1
kind: Job
metadata:
  name: job-matrix-mult-default-7
  annotations:
    scheduling/deadline-duration: "76s"  
spec:
  template:
    metadata:
      annotations:
        scheduling/deadline-duration: "76s"
      labels:
        app: matrix-mult
    spec:
      schedulerName: deadline-default-scheduler
      restartPolicy: Never
      containers:
      - name: matrix-mult
        image: evelynphs/deadline-aware-workload:matrix
        resources:
          requests:
            cpu: "1047m"
            memory: "128Mi"
        command: ["python3", "/app/matrix_mult.py", "400", "99", "98"]