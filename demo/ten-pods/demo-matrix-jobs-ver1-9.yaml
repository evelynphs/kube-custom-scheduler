apiVersion: batch/v1
kind: Job
metadata:
  name: job-matrix-mult-edf-9
  annotations:
    scheduling/deadline-duration: "518s"  
spec:
  template:
    metadata:
      annotations:
        scheduling/deadline-duration: "518s"
      labels:
        app: matrix-mult
    spec:
      schedulerName: deadline-aware-scheduler
      restartPolicy: Never
      containers:
      - name: matrix-mult
        image: evelynphs/deadline-aware-workload:matrix
        resources:
          requests:
            cpu: "999m"
            memory: "256Mi"
        command: ["python3", "/app/matrix_mult.py", "800", "2", "78"]