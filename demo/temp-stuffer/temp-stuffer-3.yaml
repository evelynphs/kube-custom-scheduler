apiVersion: batch/v1
kind: Job
metadata:
  name: temp-stuffer-3
spec:
  template:
    metadata:
    spec:    
      schedulerName: default-scheduler
      restartPolicy: Never
      containers:
      - name: compute-task
        image: busybox
        resources:
          requests:
            cpu: "2000m"
            memory: "1Gi"
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "Starting temprorary stuffer job 3"
          echo "Processing..."
          sleep 60
          echo "Task completed!"
---