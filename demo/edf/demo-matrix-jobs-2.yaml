apiVersion: batch/v1
kind: Job
metadata:
  name: job-matrix-mult-2
spec:
  template:
    metadata:
      labels:
        app: matrix-mult
    spec:
      schedulerName: default-scheduler
      restartPolicy: Never
      containers:
      - name: matrix-mult
        image: evelynphs/deadline-aware-workload:matrix
        command: ["python3", "/app/matrix_mult.py", "700", "14", "35"]