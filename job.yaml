apiVersion: batch/v1
kind: Job
metadata:
  name: <job_name>
  annotations:
    scheduling/deadline-duration: "<max_runtime>s"  
spec:
  template:
    metadata:
      annotations:
        scheduling/deadline-duration: "<max_runtime>s"
      labels:
        app: matrix-mult
    spec:
      schedulerName: <scheduler_name>
      restartPolicy: Never
      containers:
      - name: matrix-mult
        image: evelynphs/deadline-aware-workload:matrix
        resources:
          requests:
            cpu: "<cpu_usage>m"
            memory: "128Mi"
        command: ["python3", "/app/matrix_mult.py", "<size>", "<fill_a>", "<fill_b>"]